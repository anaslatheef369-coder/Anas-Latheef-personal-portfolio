<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Logistics Chatbot</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Particles Background -->
    <div id="tsparticles"></div>

    <div class="chat-container glass-card">
        <div class="chat-header">
            <i class='bx bx-brain glow-icon'></i>
            <div>
                <h2>Logistics AI Core</h2>
                <p>Status: <span class="status-online">Online</span> | Secure Connection</p>
            </div>
            <a href="https://anaslatheef369-coder.github.io/Anas-Latheef-personal-portfolio/" class="back-link"><i
                    class='bx bx-x'></i></a>
        </div>

        <div class="chat-box" id="chat-box">
            <!-- Messages will be generated here -->
        </div>

        <form class="chat-input-area" id="chat-form">
            <input type="text" id="message-input" placeholder="Enter supply chain query..." autocomplete="off" required>
            <button type="submit" class="send-btn">
                <i class='bx bx-send'></i>
            </button>
        </form>
    </div>

    <!-- tsParticles -->
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@3.0.0/tsparticles.bundle.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>

</html>
