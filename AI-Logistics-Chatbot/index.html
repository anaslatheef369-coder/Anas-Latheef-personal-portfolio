<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Logistics Chatbot</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Orbitron:wght@400;500;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-color: #050810;
            --panel-bg: rgba(12, 16, 28, 0.7);
            --text-color: #e0f2fe;
            --main-color: #00f3ff;
            --accent-color: #bd00ff;
            --glass-border: rgba(0, 243, 255, 0.2);
            --bot-msg-bg: rgba(0, 243, 255, 0.1);
            --user-msg-bg: rgba(189, 0, 255, 0.15);
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #tsparticles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 85vh;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.15), inset 0 0 20px rgba(0, 243, 255, 0.05);
            overflow: hidden;
            position: relative;
            z-index: 10;
        }

        .chat-header {
            padding: 2rem;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(5, 8, 16, 0.8);
        }

        .glow-icon {
            font-size: 3.5rem;
            color: var(--main-color);
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.8);
            margin-right: 1.5rem;
        }

        .chat-header h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .chat-header p {
            font-size: 1.2rem;
            color: #94a3b8;
            font-family: 'Orbitron', sans-serif;
        }

        .status-online {
            color: #10b981;
            text-shadow: 0 0 8px #10b981;
        }

        .back-link {
            margin-left: auto;
            color: var(--text-color);
            font-size: 2.5rem;
            text-decoration: none;
            transition: 0.3s;
        }

        .back-link:hover {
            color: var(--accent-color);
            text-shadow: 0 0 10px var(--accent-color);
        }

        .chat-box {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        .chat-box::-webkit-scrollbar {
            width: 6px;
        }

        .chat-box::-webkit-scrollbar-thumb {
            background: var(--main-color);
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            padding: 1.2rem 1.8rem;
            border-radius: 8px;
            font-size: 1.4rem;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bot-msg {
            align-self: flex-start;
            background: var(--bot-msg-bg);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-left: 4px solid var(--main-color);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.1);
        }

        .user-msg {
            align-self: flex-end;
            background: var(--user-msg-bg);
            border: 1px solid rgba(189, 0, 255, 0.3);
            border-right: 4px solid var(--accent-color);
            box-shadow: 0 0 10px rgba(189, 0, 255, 0.1);
        }

        .typing-indicator {
            align-self: flex-start;
            padding: 1rem 1.5rem;
            color: var(--main-color);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
                text-shadow: 0 0 10px var(--main-color);
            }
        }

        .chat-input-area {
            display: flex;
            padding: 1.5rem;
            background: rgba(5, 8, 16, 0.8);
            border-top: 1px solid var(--glass-border);
        }

        #message-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-color);
            font-size: 1.5rem;
            padding: 1rem;
            outline: none;
        }

        #message-input::placeholder {
            color: #64748b;
        }

        .send-btn {
            background: transparent;
            border: 1px solid var(--main-color);
            color: var(--main-color);
            width: 4.5rem;
            height: 4.5rem;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }

        .send-btn:hover {
            background: var(--main-color);
            color: var(--bg-color);
            box-shadow: 0 0 20px var(--main-color);
        }
    </style>
</head>

<body>
    <!-- Particles Background -->
    <div id="tsparticles"></div>

    <div class="chat-container glass-card">
        <div class="chat-header">
            <i class='bx bx-brain glow-icon'></i>
            <div>
                <h2>Logistics AI Core</h2>
                <p>Status: <span class="status-online">Online</span> | Secure Connection</p>
            </div>
            <!-- Links back to index.html -->
            <a href="../index.html" class="back-link"><i class='bx bx-x'></i></a>
        </div>

        <div class="chat-box" id="chat-box">
            <!-- Messages will be generated here -->
        </div>

        <form class="chat-input-area" id="chat-form">
            <input type="text" id="message-input" placeholder="Enter supply chain query..." autocomplete="off" required>
            <button type="submit" class="send-btn">
                <i class='bx bx-send'></i>
            </button>
        </form>
    </div>

    <!-- tsParticles -->
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@3.0.0/tsparticles.bundle.min.js"></script>
    <script>
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const chatBox = document.getElementById('chat-box');

        // Auto-scroll to bottom
        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Add message to chat box
        function appendMessage(msg, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(sender === 'bot' ? 'bot-msg' : 'user-msg');
            msgDiv.textContent = msg;
            chatBox.appendChild(msgDiv);
            scrollToBottom();
        }

        // Typing indicator
        let typingDiv = null;
        function showTyping() {
            if (!typingDiv) {
                typingDiv = document.createElement('div');
                typingDiv.classList.add('typing-indicator');
                typingDiv.textContent = "AI IS ANALYZING...";
                chatBox.appendChild(typingDiv);
                scrollToBottom();
            }
        }
        function hideTyping() {
            if (typingDiv) {
                typingDiv.remove();
                typingDiv = null;
            }
        }

        // Simulated AI Logic (Moved from server.js to client.js so it works without Node)
        function getLogisticsResponse(message) {
            const lowerMessage = message.toLowerCase();

            if (lowerMessage.includes('inventory') || lowerMessage.includes('stock')) {
                return "I've checked the latest warehouse data. We currently have 94% stock availability across all global distribution centers. Would you like a detailed breakdown for a specific region?";
            }
            if (lowerMessage.includes('shipment') || lowerMessage.includes('eta') || lowerMessage.includes('track')) {
                return "Analyzing current transit routes... Shipment #4928X is slightly delayed due to port congestion, but the revised ETA is still within the acceptable delivery window (Expected: Tomorrow, 14:00 GMT).";
            }
            if (lowerMessage.includes('shrinkage') || lowerMessage.includes('loss')) {
                return "Since the implementation of the new automated tracking model, overall inventory shrinkage has dropped by exactly 31.4% this quarter compared to last year.";
            }
            if (lowerMessage.includes('cost') || lowerMessage.includes('expensive')) {
                return "Running cost-reduction algorithms... I recommend rerouting our European freight through the secondary hub. This will save approximately $12,400 per month without impacting delivery timelines.";
            }
            if (lowerMessage.includes('hello') || lowerMessage.includes('hi')) {
                return "Hello, Anas! I am your AI Logistics Assistant. How can I optimize your supply chain today?";
            }

            return "I'm sorry, I didn't quite catch that logistics query. Could you specify if you need information on 'inventory', 'shipments', 'costs', or 'shrinkage'?";
        }

        // Handle Form Submission
        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const msg = messageInput.value.trim();

            if (msg) {
                // 1. Show user message
                appendMessage(msg, 'user');
                messageInput.value = '';

                // 2. Show bot typing
                showTyping();

                // 3. Wait random time (1.2 - 2.2 seconds) to simulate AI processing, then reply
                setTimeout(() => {
                    hideTyping();
                    const aiResponse = getLogisticsResponse(msg);
                    appendMessage(aiResponse, 'bot');
                }, 1200 + Math.random() * 1000);
            }
        });

        // Initialize Chatbot with Welcome Message
        window.onload = () => {
            setTimeout(() => {
                appendMessage("System Online. Secure connection established. I am ready to process global supply chain queries.", 'bot');
            }, 800);
        };

        // tsParticles Initialization for Background
        tsParticles.load("tsparticles", {
            fpsLimit: 60,
            interactivity: {
                events: {
                    onClick: { enable: true, mode: "push" },
                    onHover: { enable: true, mode: "repulse" },
                    resize: true
                },
                modes: {
                    push: { quantity: 4 },
                    repulse: { distance: 100, duration: 0.4 }
                }
            },
            particles: {
                color: { value: ["#00f3ff", "#bd00ff"] },
                links: {
                    color: "#00f3ff",
                    distance: 150,
                    enable: true,
                    opacity: 0.2,
                    width: 1
                },
                move: {
                    direction: "none",
                    enable: true,
                    outModes: { default: "bounce" },
                    random: false,
                    speed: 1,
                    straight: false
                },
                number: {
                    density: { enable: true, area: 800 },
                    value: 60
                },
                opacity: { value: 0.5 },
                shape: { type: "circle" },
                size: { value: { min: 1, max: 3 } }
            },
            detectRetina: true
        });
    </script>
</body>

</html>
